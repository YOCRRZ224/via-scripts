<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOCRRZ // Script Hub</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --border: #262626;
            --accent: #ff3e3e; /* Accent color for links/actions */
            --text-main: #e6e6e6;
            --text-dim: #888;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-mono), ui-monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 32px;
            color: var(--accent);
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

/* --- SEARCH BOX --- */
.search-box {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    transition: 0.2s;
    position: relative;
}

/* glow on focus */
.search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(255, 62, 62, 0.2);
}

/* input */
.search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-main);
    font-size: 0.85rem;
    padding: 4px;
}

/* icon */
.search-icon {
    margin-right: 8px;
    color: var(--text-dim);
    font-size: 0.9rem;
}

/* clear button */
.clear-btn {
    margin-left: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.8rem;
    opacity: 0;
    transition: 0.2s;
}

/* show clear when typing */
.search-box input:not(:placeholder-shown) + .clear-btn,
.search-box input:focus + .clear-btn {
    opacity: 1;
}

/* hover effect */
.clear-btn:hover {
    color: var(--accent);
}

/* hint text */
.search-hint {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: right;
    opacity: 0.6;
}

        .nav-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
        }

        .cat-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 4px;
            transition: 0.2s;
            color: var(--text-dim);
        }

        .cat-item:hover, .cat-item.active {
            background: var(--border);
            color: var(--text-main);
        }

        /* --- MAIN CONTENT --- */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .category-group {
            grid-column: 1 / -1;
            margin-top: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .card b { display: block; margin-bottom: 8px; font-size: 1rem; }
        .card small { color: var(--text-dim); font-size: 0.85rem; line-height: 1.4; }

        /* --- DRAWER (PREVIEW) --- */
        #preview {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100%;
            background: var(--surface);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 30px;
            z-index: 100;
        }

        #preview.active { right: 0; }

        .btn-group { display: flex; gap: 10px; margin-top: 24px; }
        
        button {
            flex: 1;
            background: var(--border);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        button.primary { background: var(--accent); color: white; }
        button:hover { opacity: 0.8; }

        /* --- TOAST --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 0.8rem;
            transform: translateY(100px);
            transition: 0.3s;
        }
        .toast.show { transform: translateY(0); }

        @media (max-width: 800px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            #preview { width: 100%; }
        }
        .card small {
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.4;
    
    /* THE MAGIC: */
    display: -webkit-box;
    -webkit-line-clamp: 2; /* Limit to exactly 2 lines */
    -webkit-box-orient: vertical;  
    overflow: hidden;
    text-overflow: ellipsis;
}
/* --- TOAST SYSTEM --- */
.toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text-main);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 0.85rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
}

.toast.show {
    transform: translateY(0);
    opacity: 1;
}

.toast::before {
    content: '✓';
    color: var(--accent);
    font-weight: bold;
}
/* --- CODE PREVIEW --- */
#code-container {
    display: none;
    margin-top: 20px;
    background: #000;
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 4px;
    max-height: 300px;
    overflow-y: auto;
}

#code-container pre {
    margin: 0;
    font-size: 0.75rem;
    color: #4af626; /* Classic Matrix/Terminal Green */
    white-space: pre-wrap;
    word-break: break-all;
}

.secondary-btn {
    background: transparent;
    border: 1px solid var(--border);
    font-size: 0.75rem;
    margin-top: 10px;
    width: 100%;
    color: var(--text-dim);
}

.secondary-btn:hover {
    border-color: var(--text-main);
    color: var(--text-main);
}
/* --- SKELETON LOADING --- */
.skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 8px;
    height: 140px; /* Match your card height */
    position: relative;
    overflow: hidden;
}

.skeleton::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    transform: translateX(-100%);
    background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0,
        rgba(255, 255, 255, 0.05) 50%,
        rgba(255, 255, 255, 0) 100%
    );
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
    100% { transform: translateX(100%); }
}

.skeleton-title {
    width: 60%;
    height: 18px;
    background: var(--border);
    margin-bottom: 12px;
    border-radius: 4px;
}

.skeleton-text {
    width: 90%;
    height: 12px;
    background: var(--border);
    margin-bottom: 8px;
    border-radius: 4px;
}
.card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 15px rgba(255, 62, 62, 0.15); /* Subtle red glow */
}

.card:active {
    transform: translateY(0);
    border-color: #fff; /* White flash on click */
}

/* Custom scrollbar for that sleek terminal look */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: var(--bg);
}
::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
}
/* --- CUSTOM DROPDOWN --- */
.dropdown {
  position: relative;
}

.dropdown-btn {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text-main);
  background: var(--bg);
}

.dropdown-btn:hover {
  border-color: var(--text-dim);
}

.dropdown-menu {
  position: absolute;
  top: 110%;
  left: 0;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  max-height: 220px;
  overflow-y: auto;

  opacity: 0;
  pointer-events: none;
  transform: translateY(-5px);
  transition: 0.2s;
  z-index: 20;
}

.dropdown.open .dropdown-menu {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

/* optional: tighter items */
.dropdown-menu .cat-item {
  margin: 0;
}
.highlight {
  background: rgba(255, 62, 62, 0.15);
  color: var(--accent);
  padding: 1px 3px;
  border-radius: 3px;
}
/* Enable scrolling in the preview drawer */
#preview {
    overflow-y: auto;
    overflow-x: hidden;
}

/* Custom Video Container to fix that Portrait height */
.video-wrapper {
    position: relative;
    width: 100%;
    max-width: 260px; /* Limits width so height stays sane */
    margin: 0 auto;   /* Centers it */
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #000;
    overflow: hidden;
}

video#guide-video {
    width: 100%;
    display: block;
    max-height: 450px; /* Hard limit for vertical videos */
    object-fit: contain;
}

/* Custom Controls Bar */
.video-controls {
    display: flex;
    align-items: center;
    gap: 15px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
}

.control-btn {
    cursor: pointer;
    color: var(--accent);
    transition: 0.2s;
}

.control-btn:hover {
    color: #fff;
}

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">YOCRRZ_LABS</div>
<div class="search-wrapper">
  <div class="search-box">
    <span class="search-icon">⌕</span>
    
    <input 
      id="search" 
      placeholder="Search scripts..." 
      autocomplete="off"
    >

    <span class="clear-btn" onclick="clearSearch()">✕</span>
  </div>

  <div class="search-hint">Press "/" to focus</div>

  <button class="secondary-btn" onclick="openInstallGuide()" style="margin-top:10px; border-style: dashed;">
    📖 HOW_TO_INSTALL_STEPS
  </button>

  <div class="cat-item" onclick="openSubmitGuide()" style="color: var(--accent); border: 1px dashed var(--accent); text-align: center; margin-top: 10px;">
    + SUBMIT_SCRIPT
  </div>
</div>
        
        <span class="nav-label">Categories</span>
<div id="categories">

  <div class="dropdown">
    <div class="dropdown-btn" onclick="toggleDropdown()">
      Categories ▾
    </div>

    <div class="dropdown-menu" id="dropdown-menu">
      <div class="cat-item active" onclick="filterCategory(null, this)">
        All Scripts
        <span id="all-count" style="opacity:0.5;font-size:0.75rem;margin-left:6px;"></span>
      </div>
    </div>

  </div>

</div>
    </aside>

    <main class="main">
        <div id="app" class="grid"></div>
    </main>

    <div id="preview"></div>
    <div id="toast" class="toast">Copied to clipboard</div>



<script>
const USER = "YOCRRZ224";
const REPO = "via-scripts";
let allScripts = [];
let activeCategory = null;

function toggleDropdown() {
  document.querySelector(".dropdown").classList.toggle("open");
}

async function loadScripts() {
    const container = document.getElementById("app");

    // 1. BOOT SKELETONS (Visual feedback while API is busy)
    // We render 6 empty "ghost" cards to fill the initial grid
    container.innerHTML = Array(6).fill(0).map(() => `
        <div class="skeleton">
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text" style="width: 70%"></div>
        </div>
    `).join('');

    try {
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/scripts`);
        
        // Handle API errors (like rate limits or private repos)
        if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
        
        const files = await res.json();
        
        const fetchPromises = files
            .filter(f => f.name.endsWith(".js"))
            .map(async file => {
                const rawURL = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}/scripts/${file.name}`;
                try {
                    const scriptRes = await fetch(rawURL);
                    const text = await scriptRes.text();
                    return { 
                        meta: parseMeta(text), 
                        url: rawURL,
                        filename: file.name // Required for encoded links and auditing
                    };
                } catch (err) {
                    console.error(`Failed to fetch ${file.name}`, err);
                    return null;
                }
            });

        // 2. WAIT FOR ALL DATA
        const results = await Promise.all(fetchPromises);
        allScripts = results.filter(s => s !== null); // Remove failed fetches

        // 3. SWAP SKELETONS FOR REAL CARDS
        render();
        renderSidebar();
        
    } catch (e) {
        // UI Error State
        container.innerHTML = `
            <div style="grid-column: 1/-1; padding: 40px; text-align: center; color: var(--accent);">
                [ ERROR_BOOT_SEQUENCE_FAILED ]<br>
                <small style="color: var(--text-dim); margin-top: 10px; display: block;">
                    ${e.message}
                </small>
            </div>
        `;
        console.error("Hub Boot Failure:", e);
    }
}


function parseMeta(code) {
    const block = code.match(/\/\/ ==UserScript==([\s\S]*?)\/\/ ==\/UserScript==/);
    const meta = { category: "General", match: [] }; // Initialize match as array
    if (block) {
        block[1].split("\n").forEach(line => {
            const m = line.match(/@(\w+)\s+(.*)/);
            if (m) {
                const key = m[1];
                const value = m[2].trim();
                if (key === 'match' || key === 'include') {
                    meta.match.push(value);
                } else {
                    meta[key] = value;
                }
            }
        });
    }
    return meta;
}


function getMatchDisplay(matchArray) {
    if (!matchArray || matchArray.length === 0) return "Not Specified";
    
    // Check if it matches everything
    const isGlobal = matchArray.some(m => m.includes('*://*/*') || m === '*' || m.includes('http*://*'));
    if (isGlobal) return "All Sites";

    // Extract domains from the first few matches
    return matchArray.slice(0, 2).map(m => {
        try {
            // Basic regex to pull domain out of match pattern
            const domain = m.replace(/^(.*:\/\/|^\*:\/\/)/, '').split('/')[0].replace(/^\*\./, '');
            return domain || m;
        } catch(e) { return m; }
    }).join(', ') + (matchArray.length > 2 ? '...' : '');
}

// 🔍 FUZZY SEARCH
function fuzzyMatch(text, query) {
    text = text.toLowerCase();
    query = query.toLowerCase();

    let tIndex = 0;
    for (let qIndex = 0; qIndex < query.length; qIndex++) {
        tIndex = text.indexOf(query[qIndex], tIndex);
        if (tIndex === -1) return false;
        tIndex++;
    }
    return true;
}

// 🎯 HIGHLIGHT MATCHES
function highlight(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, `<span class="highlight">$1</span>`);
}

// 🧩 FILTER STATE (ADD THIS GLOBALLY IF NOT EXISTS)
let activeFilter = "all"; // all | global | site

function renderSidebar() {
  const container = document.getElementById("dropdown-menu");

  // KEEP "All Scripts"
  container.innerHTML = `
    <div class="cat-item active" onclick="filterCategory(null, this)">
      All Scripts
      <span id="all-count" style="opacity:0.5;font-size:0.75rem;margin-left:6px;"></span>
    </div>
  `;

  const cats = [...new Set(allScripts.map(s => s.meta.category))];

  cats.forEach(cat => {
    const el = document.createElement("div");
    el.className = "cat-item";
    el.innerText = cat;

    el.onclick = () => {
      filterCategory(cat, el);
      document.querySelector(".dropdown").classList.remove("open"); // close after select
    };

    container.appendChild(el);
  });
}
document.addEventListener("click", (e) => {
  const dropdown = document.querySelector(".dropdown");
  if (!dropdown.contains(e.target)) {
    dropdown.classList.remove("open");
  }
});
function filterCategory(cat, el) {
    activeCategory = cat;
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    render();
}

async function toggleCode(url) {
    const container = document.getElementById("code-container");
    const pre = document.getElementById("raw-code");
    const btn = document.getElementById("view-code-btn");

    if (container.style.display === "block") {
        container.style.display = "none";
        btn.innerText = "View Source Code";
    } else {
        container.style.display = "block";
        btn.innerText = "Hide Source Code";
        
        if (pre.innerText === "Loading binary...") {
            try {
                const res = await fetch(url);
                const code = await res.text();
                pre.innerText = code;
            } catch (e) {
                pre.innerText = "// Error fetching source.";
            }
        }
    }
}


function closePreview() {
    document.getElementById("preview").classList.remove("active");
}

function copy(text) {
    navigator.clipboard.writeText(text);
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

document.getElementById("search").oninput = render;
// --- NOTIFICATION LOGIC ---
function showToast(message) {
    // Create toast if it doesn't exist
    let toast = document.getElementById("toast-msg");
    if (!toast) {
        toast = document.createElement("div");
        toast.id = "toast-msg";
        toast.className = "toast";
        document.body.appendChild(toast);
    }

    toast.innerText = message;
    toast.classList.add("show");

    // Auto-hide after 3 seconds
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
async function openPreview(script) {
    const p = document.getElementById("preview");
    const matchText = getMatchDisplay(script.meta.match);
    const matchClass = matchText === "All Sites" ? "global-target" : "specific-target";

    p.innerHTML = `
        <div style="color:var(--accent); cursor:pointer; margin-bottom:20px" onclick="closePreview()">[ ESCAPE_PREVIEW ]</div>
        
        <h2 style="margin:0 0 5px 0">${script.meta.icon || '⚡'} ${script.meta.name}</h2>
        
        <div style="margin-bottom:15px; font-size:0.7rem; letter-spacing:1px; display:flex; align-items:center; gap:6px;">
            <span style="color:var(--text-dim)">TARGET:</span>
            <span class="${matchClass}" style="color:${matchText === 'All Sites' ? '#4af626' : 'var(--accent)'}">${matchText.toUpperCase()}</span>
        </div>

        <p style="color:var(--text-dim); font-size:0.9rem; line-height:1.6">${script.meta.description || 'No description provided.'}</p>
        
        <div class="btn-group">
            <button class="primary" onclick="install('${script.url}')">Install via CDN</button>
        </div>
  <button class="secondary-btn" onclick="openInstallGuide()" style="margin-bottom: 10px; border-style: dashed;">
        📖 HOW_TO_INSTALL_STEPS
    </button>
        <button class="secondary-btn" id="view-code-btn" onclick="toggleCode('${script.url}')">View Source Code</button>

        <div id="code-container">
            <pre id="raw-code">Loading binary...</pre>
        </div>

        <div style="margin-top:30px; font-size:0.75rem; color:var(--text-dim); border-top:1px solid var(--border); padding-top:15px;">
            <div style="margin-bottom:5px">AUTHOR: <span style="color:var(--text-main)">${script.meta.author || 'YOCRRZ'}</span></div>
            <div>VERSION: <span style="color:var(--text-main)">${script.meta.version || '1.0.0'}</span></div>
        </div>
    `;
    p.classList.add("active");
}

async function install(url) {
    try {
        await navigator.clipboard.writeText(url);
        showToast("CDN URL Copied! Paste into Via Browser.");
    } catch (err) {
        console.error('Failed to copy: ', err);
        // Fallback for older browsers
        const el = document.createElement('textarea');
        el.value = url;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("URL Copied (Fallback)");
    }
}

function openSubmitGuide() {
    const p = document.getElementById("preview");
    
    // The Template String (your Blueprint)
    const templateCode = `// ==UserScript==
// @name         [PROJECT_NAME]
// @namespace    [YOUR_NAME]
// @version      [VER_NUM]
// @description  [DESC]
// @author       [YOUR_NAME]
// @match        *://*/* or (specific website like www.google.com)
// @grant        none
// @icon         [emoji or a letter]
// @category     [category]
// @run-at       document-idle
// ==/UserScript==

(function() {
    'use strict';
    console.log("[YOCRRZ_LABS] App Initialized...");
    // Your code here
})();`;

    p.innerHTML = `
        <div style="color:var(--accent); cursor:pointer; margin-bottom:20px" onclick="closePreview()">[ ESCAPE_GUIDE ]</div>
        
        <h2 style="margin:0 0 10px 0">🚀 Create & Contribute</h2>
        <p style="color:var(--text-dim); font-size:0.85rem; line-height:1.6">
            Use our official Blueprint to build your script, then submit it to the Hub.
        </p>

        <div style="margin: 20px 0;">
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--border); padding:8px 12px; border-radius:4px 4px 0 0; font-size:0.7rem; color:var(--accent);">
                <span>BLUEPRINT: TEMPLATE.JS</span>
                <div style="display:flex; gap:10px;">
                    <span style="cursor:pointer; color:var(--text-main)" onclick="copyTemplate()">[ COPY ]</span>
                </div>
            </div>
            <pre id="template-area" style="margin:0; background:#000; padding:15px; font-size:0.75rem; color:#4af626; border:1px solid var(--border); border-top:none; overflow-x:auto; max-height:200px;">${templateCode}</pre>
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="primary" onclick="downloadTemplate()">[ DOWNLOAD_STARTER_KIT ]</button>
            <button class="secondary-btn" onclick="window.open('https://github.com/${USER}/${REPO}/fork', '_blank')">
                [ FORK_REPO_TO_SUBMIT ]
            </button>
        </div>

        <div style="margin-top:25px; padding-top:15px; border-top:1px solid var(--border);">
            <small style="color:var(--text-dim); display:block; margin-bottom:10px;">SUBMISSION_FLOW:</small>
            <div style="font-size:0.75rem; color:var(--text-main); line-height:1.8;">
                1. Edit your <code style="color:var(--accent)">.js</code> file.<br>
                2. Upload to <code style="color:var(--accent)">/scripts</code> in your fork.<br>
                3. Open a Pull Request for review.
            </div>
        </div>
    `;

    // Internal Helper: Copy
    window.copyTemplate = () => {
        navigator.clipboard.writeText(templateCode);
        showToast("Blueprint Copied to Clipboard!");
    };

    // Internal Helper: Download
    window.downloadTemplate = () => {
        const blob = new Blob([templateCode], {type: 'text/javascript'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'yocrrz_template.js';
        a.click();
        URL.revokeObjectURL(url);
        showToast("Downloading Template...");
    };

    p.classList.add("active");
}

function render() {
    const container = document.getElementById("app");
    const searchInput = document.getElementById("search");
    const allCountEl = document.getElementById("all-count");

    if (!container) return;
    container.innerHTML = "";

    // 1. Get current search state
    const query = searchInput.value.toLowerCase().trim();

    // 2. FILTER: Strictly remove non-matching items
    const filtered = allScripts.filter(s => {
        const name = (s.meta.name || "").toLowerCase();
        const desc = (s.meta.description || "").toLowerCase();
        const cat = (s.meta.category || "general").toLowerCase();

        // Check if it matches the Search Query
        const matchesSearch = !query || 
                             name.includes(query) || 
                             desc.includes(query) || 
                             cat.includes(query);

        // Check if it matches the Selected Category
        const matchesCategory = !activeCategory || s.meta.category === activeCategory;

        // ONLY return true if BOTH conditions are met
        return matchesSearch && matchesCategory;
    });

    // 3. Update the "All Scripts" count in the sidebar
    if (allCountEl) allCountEl.innerText = `(${allScripts.length})`;

    // 4. EMPTY STATE: If no matches, show the "Empty" UI
    if (filtered.length === 0) {
        container.innerHTML = `
            <div style="grid-column: 1/-1; padding: 60px; text-align: center; color: var(--text-dim); border: 1px dashed var(--border); border-radius: 8px;">
                <div style="font-size: 1.5rem; margin-bottom: 10px;">∅</div>
                [ NO_MATCHES_FOUND_FOR: "${query}" ]
            </div>
        `;
        return;
    }

    // 5. RENDER: Create cards only for the filtered list
    filtered.forEach(s => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                <b style="font-size:0.95rem;">
                    ${s.meta.icon || '📦'} 
                    ${highlight(s.meta.name || "Unknown", query)}
                </b>
                <span style="font-size:0.65rem; color:var(--accent); background:rgba(255,62,62,0.1); padding:2px 6px; border-radius:4px; border:1px solid rgba(255,62,62,0.2);">
                    ${s.meta.version || 'v1.0'}
                </span>
            </div>
            <small>${highlight(s.meta.description || "No description available.", query)}</small>
        `;
        card.onclick = () => openPreview(s);
        container.appendChild(card);
    });
}

// Logic for custom video control
function togglePlay() {
    const vid = document.getElementById("guide-video");
    const status = document.getElementById("vid-status");
    if (vid.paused) {
        vid.play();
        status.innerText = "EXECUTING...";
        status.style.color = "#4af626"; // Terminal Green
    } else {
        vid.pause();
        status.innerText = "PAUSED";
        status.style.color = "var(--text-dim)";
    }
}


function setFilter(type, el) {
    activeFilter = type;

    document.querySelectorAll(".chip").forEach(c =>
        c.classList.remove("active")
    );

    el.classList.add("active");
    render();
}
document.addEventListener("keydown", (e) => {
    if (e.key === "/") {
        e.preventDefault();
        document.getElementById("search").focus();
    }

    if (e.key === "Escape") {
        document.getElementById("search").value = "";
        render();
    }
});
function clearSearch() {
    const input = document.getElementById("search");
    input.value = "";
    input.focus();
    render();
}
loadScripts();
</script>
